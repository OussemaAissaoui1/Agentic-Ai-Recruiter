<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>HeadTTS worker probe</title>
<style>
  body { font: 13px/1.5 monospace; padding: 24px; background:#0f0f1a; color:#e2e8f0; }
  .ok  { color:#22c55e; }
  .bad { color:#ef4444; }
  pre  { white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<h2>HeadTTS Module Worker probe</h2>
<p>Spawns the worker three different ways. Watch DevTools console too.</p>
<pre id="log"></pre>
<script type="module">
const log = (msg, cls="") => {
  const el = document.getElementById("log");
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  console.log(msg);
};

const ABS = location.origin + "/modules/worker-tts.mjs";

log("=== probe start ===");
log("origin = " + location.origin);
log("crossOriginIsolated = " + window.crossOriginIsolated);
log("WebGPU available = " + ("gpu" in navigator));

// [A] Direct Worker — absolute URL
try {
  log("\n[A] new Worker(" + ABS + ", type:module)");
  const w = new Worker(ABS, { type: "module" });
  w.onerror   = (e) => log("  A.onerror: " + e.message + " at " + e.filename + ":" + e.lineno + ":" + e.colno, "bad");
  w.onmessage = (e) => log("  A.onmessage: " + JSON.stringify(e.data)?.slice(0, 220), "ok");
  setTimeout(() => log("  A: still alive after 4s"), 4000);
} catch (e) {
  log("  A.CTOR threw: " + e.name + ": " + e.message, "bad");
}

// [B] Blob shim with ABSOLUTE URL inside
setTimeout(() => {
  try {
    log("\n[B] Blob shim Worker, import absolute URL");
    const code = `import "${ABS}";`;
    const blob = new Blob([code], { type: "application/javascript" });
    const url  = URL.createObjectURL(blob);
    const w    = new Worker(url, { type: "module" });
    w.onerror   = (e) => log("  B.onerror: " + e.message + " at " + e.filename + ":" + e.lineno + ":" + e.colno, "bad");
    w.onmessage = (e) => log("  B.onmessage: " + JSON.stringify(e.data)?.slice(0, 220), "ok");
    setTimeout(() => log("  B: still alive after 4s"), 4000);
  } catch (e) {
    log("  B.CTOR threw: " + e.name + ": " + e.message, "bad");
  }
}, 6000);

// [C] Blob shim with ROOT-RELATIVE path (the broken case)
setTimeout(() => {
  try {
    log("\n[C] Blob shim Worker, import root-relative '/modules/worker-tts.mjs'");
    const code = `import "/modules/worker-tts.mjs";`;
    const blob = new Blob([code], { type: "application/javascript" });
    const url  = URL.createObjectURL(blob);
    const w    = new Worker(url, { type: "module" });
    w.onerror   = (e) => log("  C.onerror: " + e.message + " at " + e.filename + ":" + e.lineno + ":" + e.colno, "bad");
    w.onmessage = (e) => log("  C.onmessage: " + JSON.stringify(e.data)?.slice(0, 220), "ok");
    setTimeout(() => log("  C: still alive after 4s"), 4000);
  } catch (e) {
    log("  C.CTOR threw: " + e.name + ": " + e.message, "bad");
  }
}, 12000);

// [D] Direct fetch sanity check
setTimeout(async () => {
  log("\n[D] fetch /modules/worker-tts.mjs");
  try {
    const r = await fetch("/modules/worker-tts.mjs");
    log("  HTTP " + r.status + " " + r.headers.get("content-type") + ", " + r.headers.get("content-length") + " bytes",
        r.ok ? "ok" : "bad");
  } catch(e) {
    log("  fetch threw: " + e.message, "bad");
  }
}, 18000);
</script>
</body>
</html>
