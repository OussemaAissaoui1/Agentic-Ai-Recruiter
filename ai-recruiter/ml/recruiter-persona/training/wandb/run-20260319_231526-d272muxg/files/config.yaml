base_model:
    value: meta-llama/Meta-Llama-3.1-8B-Instruct
eval_data:
    value: ../data/final/recruiter_llama_eval_messages.jsonl
expected_metrics:
    value:
        final_eval_loss: 0.5-0.9
        final_train_loss: 0.4-0.8
        initial_loss: 2.0-2.5
        total_steps: ~730
hardware:
    value:
        expected_training_time_hours: 4-5
        expected_usage_gb: 18-20
        gpu: L40
        vram_gb: 24
inference:
    value:
        do_sample: true
        max_new_tokens: 256
        repetition_penalty: 1.1
        temperature: 0.7
        top_k: 50
        top_p: 0.9
lora:
    value:
        bias: none
        lora_alpha: 64
        lora_dropout: 0.05
        r: 32
        target_modules:
            - q_proj
            - k_proj
            - v_proj
            - o_proj
            - gate_proj
            - up_proj
            - down_proj
        task_type: CAUSAL_LM
method:
    value: qlora
output_dir:
    value: ./output/recruiter-persona-llama-3.1-8b
quantization:
    value:
        bnb_4bit_compute_dtype: bfloat16
        bnb_4bit_quant_type: nf4
        bnb_4bit_use_double_quant: true
        load_in_4bit: true
train_data:
    value: ../data/final/recruiter_llama_train_messages.jsonl
training:
    value:
        bf16: true
        data_seed: 42
        dataloader_num_workers: 4
        ddp_find_unused_parameters: false
        eval_steps: 100
        eval_strategy: steps
        fp16: false
        gradient_accumulation_steps: 8
        gradient_checkpointing: true
        greater_is_better: false
        group_by_length: false
        learning_rate: 0.0002
        load_best_model_at_end: true
        logging_dir: ./logs
        logging_first_step: true
        logging_steps: 10
        lr_scheduler_type: cosine
        max_seq_length: 2048
        max_steps: -1
        metric_for_best_model: eval_loss
        num_train_epochs: 3
        optim: paged_adamw_8bit
        packing: false
        per_device_eval_batch_size: 4
        per_device_train_batch_size: 4
        remove_unused_columns: true
        report_to: wandb
        save_steps: 100
        save_strategy: steps
        save_total_limit: 3
        seed: 42
        tf32: true
        warmup_ratio: 0.03
        weight_decay: 0.01
wandb:
    value:
        name: llama-3.1-8b-qlora
        notes: Fine-tuning Llama 3.1 8B for recruiter persona using QLoRA on L40 24GB
        project: recruiter-persona-finetuning
        tags:
            - recruiter
            - persona
            - qlora
            - llama-3.1
