# Unified AI Recruiter runtime configuration.
#
# Override per-environment via env vars:
#   AIR_HOST, AIR_PORT, AIR_LOG_LEVEL, AIR_GPU_VLLM_FRACTION,
#   HF_TOKEN (required for matching extract-signals LLM).
#
# All paths are resolved relative to the ai-recruiter/ directory.

server:
  host: 0.0.0.0
  port: 8000
  log_level: INFO
  cors_origins: ["*"]            # tighten in production

gpu_policy:
  vllm_mem_fraction: 0.85        # L4 (24GB): need 0.85 to fit 8B weights + KV cache
                                 # if running on a 90GB+ GPU shared with vision, drop to 0.55
  prefer_gpu_for: ["nlp", "vision_visual_mlp", "matching_gnn"]
  prefer_cpu_for: ["nlp_scorer", "nlp_refiner", "nlp_tts", "matching_lda"]

agents:
  startup_order:
    - matching        # cheap, only loads MiniLM + ckpts on first request
    - avatar          # cheap (GLB + viseme engine)
    - vision          # mediapipe loads here (small)
    - voice           # ASR/prosody only — stub today
    - scoring
    - orchestrator
    - jd_generation   # cheap; Neo4j driver lazy, no model load
    - nlp             # last; vLLM stays lazy until /api/nlp/warmup

paths:
  matching_artifacts: "agents/matching/artifacts"
  vision_models: "agents/vision/models"
  vision_weights: "agents/vision/weights"
  vision_reports: "artifacts/vision/reports"
  scoring_dir: "artifacts/scoring"
  uploads: "artifacts/uploads"
  nlp_model_cache: "model_cache"

vision:
  enable_video: true
  enable_audio: true                  # uses Wav2Vec2; StudentNet head is fallback
  use_body_pose: true
  enable_hands: true
  calibration_duration: 45

matching:
  fallback_chain: ["gnn", "tapjfnn", "cosine"]
  llm_model: "meta-llama/Llama-3.2-3B-Instruct"

nlp:
  model_path: "model_cache"
  enable_scorer: true
  enable_refiner: true
  enable_tts: true
  tts_voice: "af_heart"
  # vLLM context window. 2048 is too small for system prompt + full CV + JD +
  # history; 8192 is the safe default. Override per-deployment with the
  # NLP_MAX_MODEL_LEN env var.
  max_model_len: 8192

jd_generation:
  # Neo4j connection comes entirely from env vars — see .env.example.
  # The agent's startup() will mark itself as ERROR if these are missing.
  neo4j:
    uri_env: JD_NEO4J_URI
    user_env: JD_NEO4J_USER
    password_env: JD_NEO4J_PASSWORD
    database_env: JD_NEO4J_DATABASE
    # database: defaults to the user's home database when unset (Aura-friendly).
    # Set explicitly only for multi-database instances.
    connection_timeout_s: 5

  llm:
    backend: groq
    model: llama-3.3-70b-versatile
    api_key_env: GROQ_API_KEY
    temperature_synthesis: 0.7
    temperature_tool_select: 0.0
    request_timeout_s: 60

  agent:
    max_tool_calls: 15
    max_revisions: 3
    rejection_lookback: 10
    # Hardcoded preambles bypass the model's tool-choice — these always fire
    # before the model takes over. See runtime/runner.py.
    deterministic_preambles: ["find_role_family", "get_past_rejections"]

  upload:
    max_file_size_mb: 20
    allowed_extensions: ["json", "csv", "zip"]
    # When set, refuse `replace` mode to prevent wiping a production-like graph.
    prod_guard_env: JD_PROD_GUARD
